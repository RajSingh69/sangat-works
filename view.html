<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Member Profile | Sangat Works</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<header class="site-header">
  <a class="logo" href="index.html">Sangat Works</a>
  <nav>
    <a href="index.html">Home</a>
    <a href="map.html">Map</a>
    <div id="accountArea"></div>
  </nav>
</header>

<main class="page-wrap">
  <section id="publicProfile" class="public-profile">
    <div class="empty-state">Loading profile...</div>
  </section>

  <section class="reviews-section">
    <h2>Reviews & Recommendations</h2>
    <p>See what other members of the Sangat have said.</p>

    <div id="reviewsList"></div>

    <form id="reviewForm" class="review-form">
      <h3>Leave a Review</h3>

      <input type="text" id="reviewerName" placeholder="Your name" required />
      <input type="text" id="serviceUsed" placeholder="Service used e.g. Electrical work, tutoring, website" />

      <select id="rating" required>
        <option value="">Select rating</option>
        <option value="5">5 - Excellent</option>
        <option value="4">4 - Very good</option>
        <option value="3">3 - Good</option>
        <option value="2">2 - Okay</option>
        <option value="1">1 - Poor</option>
      </select>

      <textarea id="reviewText" placeholder="Write your review or recommendation" required></textarea>

      <button type="submit" class="btn-primary full">Submit Review</button>
      <p id="reviewMessage" class="message"></p>
    </form>
  </section>
</main>

<script type="module" src="js/nav.js"></script>
<script type="module" src="js/profile.js"></script>
<script type="module" src="js/reviews.js"></script>

</body>
</html>
