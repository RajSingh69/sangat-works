<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Directory | Sangat Works</title>
  <link rel="stylesheet" href="css/style.css?v=5001" />
</head>
<body>

<header class="site-header">
  <a class="logo" href="index.html">Sangat Works</a>
  <nav>
    <a href="index.html">Home</a>
    <div id="accountArea"></div>
  </nav>
</header>

<main class="directory-page">

  <section class="directory-hero">
    <p class="eyebrow">Search the Sangat</p>
    <h1>Find Sikh businesses, trades and professionals.</h1>
    <p>
      Search by skill, trade, location, business type, Gurdwara association or keyword.
    </p>

    <div class="directory-search-bar">
      <input
        type="text"
        id="searchInput"
        placeholder="Search electrician, plumber, accountant, developer..."
      />
      <button id="searchBtn" type="button">Search</button>
    </div>
  </section>

  <section class="directory-layout">

    <aside class="directory-filters">
      <h2>Filters</h2>

      <div class="filter-block">
        <label for="locationFilter">Location</label>
        <select id="locationFilter">
          <option value="">All locations</option>
        </select>
      </div>

      <div class="filter-block">
        <label for="gurdwaraFilter">Gurdwara</label>
        <select id="gurdwaraFilter">
          <option value="">All Gurdwaras</option>
        </select>
      </div>

      <div class="filter-block">
        <label for="serviceFilter">Service</label>
        <select id="serviceFilter">
          <option value="">All services</option>
        </select>
      </div>

      <div class="filter-check">
        <input type="checkbox" id="featuredFilter" />
        <label for="featuredFilter">Featured only</label>
      </div>

      <button id="clearFiltersBtn" class="btn-secondary full" type="button">
        Clear Filters
      </button>
    </aside>

    <section class="directory-results-area">
      <div class="directory-results-top">

        <div>
          <h2>Directory Results</h2>
          <p id="directoryCount">Loading profiles...</p>
        </div>

        <select id="sortBy">
          <option value="featured">Featured First</option>
          <option value="rating">Highest Rated</option>
          <option value="experience">Most Experienced</option>
          <option value="newest">Newest Members</option>
        </select>

      </div>

      <div id="directoryResults" class="directory-results-grid">
        <div class="empty-state">
          Loading Sangat Works profiles...
        </div>
      </div>
    </section>

  </section>

</main>

<footer>
  <p>Sangat Works — built for community support.</p>
</footer>

<script type="module" src="js/nav.js"></script>
<script type="module" src="js/directory.js?v=5001"></script>

</body>
</html>
