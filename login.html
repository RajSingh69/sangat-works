<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Sangat Works</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<header class="site-header">
  <div class="logo">Sangat Works</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="map.html">Map</a>
    <a href="login.html" class="btn-small">Login</a>
  </nav>
</header>

<main class="page-wrap">
  <section class="form-card">
    <h1>Join Sangat Works</h1>
    <p>Create an account or log in to manage your profile.</p>

    <div class="tabs">
      <button class="tab active" id="showLogin">Login</button>
      <button class="tab" id="showRegister">Register</button>
    </div>

    <form id="loginForm">
      <input type="email" id="loginEmail" placeholder="Email address" required />
      <input type="password" id="loginPassword" placeholder="Password" required />
      <button type="submit" class="btn-primary full">Login</button>
    </form>

    <form id="registerForm" class="hidden">
      <input type="text" id="registerName" placeholder="Full name" required />
      <input type="email" id="registerEmail" placeholder="Email address" required />
      <input type="password" id="registerPassword" placeholder="Password" required />
      <button type="submit" class="btn-primary full">Create Account</button>
    </form>

    <p id="authMessage" class="message"></p>
  </section>
</main>

<script type="module" src="js/auth.js"></script>

</body>
</html>
