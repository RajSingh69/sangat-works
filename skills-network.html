<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gurdwara Skills Network | Sangat Works</title>
  <link rel="stylesheet" href="css/style.css?v=4001" />
</head>
<body>

<header class="site-header">
  <a class="logo" href="index.html">Sangat Works</a>
  <nav>
    <a href="index.html">Home</a>
    <a href="directory.html">Directory</a>
    <a href="map.html">Map</a>
    <a href="profile.html" class="btn-small">My Profile</a>
  </nav>
</header>

<main class="page-wrap">
  <section class="form-card wide">
    <h1>Gurdwara Skills Network</h1>
    <p>
      Find and organise trusted skills within your local Gurdwara community.
    </p>

    <div class="profile-strength-box">
      <div class="strength-top">
        <strong>Your Local Gurdwara</strong>
      </div>

      <p id="userGurdwaraName">Loading...</p>
      <select id="skillsGurdwaraSelect" aria-label="Select your local Gurdwara">
        <option value="">Select your Gurdwara</option>
      </select>
    </div>

    <div class="profile-strength-box">
      <div class="strength-top">
        <strong>Skills Pools</strong>
      </div>

      <div id="skillsPoolsList" class="dashboard-grid"></div>

      <div id="emptyPoolsBox" class="profile-strength-box" style="display:none;">
        <p>No pools exist for this Gurdwara yet.</p>
        <button id="createStarterPoolsBtn" class="btn-primary" type="button">
          Create Starter Pools
        </button>
      </div>
    </div>

    <p id="skillsNetworkMessage" class="message"></p>
  </section>
</main>

<script type="module" src="js/nav.js"></script>
<script type="module">
  import { protectPage } from "./js/subscription-guard.js";
  protectPage();
</script>

<script type="module" src="js/skills-network.js"></script>
</body>
</html>
