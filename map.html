<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Map | Sangat Works</title>
  <link rel="stylesheet" href="css/style.css" />

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    .map-page {
      width: 94%;
      max-width: 1280px;
      margin: 42px auto;
    }

    .map-intro-card {
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      border-radius: 28px;
      padding: clamp(22px, 4vw, 38px);
      margin-bottom: 22px;
    }

    .map-intro-card h1 {
      font-size: clamp(2rem, 5vw, 3.2rem);
      color: var(--blue);
      letter-spacing: -0.05em;
      line-height: 1.05;
      margin-bottom: 10px;
    }

    .map-intro-card p {
      color: var(--muted);
      max-width: 780px;
      margin-bottom: 22px;
    }

    .map-controls {
      display: grid;
      gap: 14px;
      margin-top: 18px;
    }

    .map-search-row {
      display: grid;
      grid-template-columns: 1fr 150px;
      gap: 12px;
    }

    .map-search-row button,
    .map-filter-actions button {
      background: var(--blue);
      color: white;
      padding: 12px 18px;
    }

    .map-filter-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    .map-filter-block label {
      display: block;
      color: var(--blue);
      font-weight: 900;
      font-size: 0.9rem;
      margin-bottom: 6px;
    }

    .map-filter-check {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #fffdf8;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 13px 14px;
      color: var(--blue);
      font-weight: 900;
    }

    .map-filter-check input {
      width: auto;
    }

    .map-results-summary {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 12px;
      color: var(--muted);
      font-weight: 800;
    }

    .map-filter-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .map-filter-actions .map-reset-btn {
      background: #ffffff;
      color: var(--blue);
      border: 1px solid var(--border);
      box-shadow: none;
    }

    #map {
      width: 100%;
      height: 650px;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      background: white;
    }

    .map-popup {
      width: 270px;
      max-width: 270px;
      font-family: Arial, sans-serif;
      color: var(--text);
    }

    .map-popup-top {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 10px;
    }

    .map-popup-photo {
      width: 58px;
      height: 58px;
      object-fit: cover;
      border-radius: 50%;
      border: 3px solid white;
      box-shadow: 0 8px 20px rgba(18, 60, 105, 0.12);
      background: #fff;
      flex: 0 0 auto;
    }

    .map-popup-logo {
      width: 72px;
      max-height: 52px;
      object-fit: contain;
      background: white;
      border: 1px solid rgba(18, 60, 105, 0.12);
      border-radius: 12px;
      padding: 6px;
      flex: 0 0 auto;
    }

    .map-popup h3 {
      color: var(--blue);
      font-size: 1.08rem;
      line-height: 1.18;
      margin: 0 0 4px;
    }

    .map-popup-service {
      color: var(--orange-dark);
      font-weight: 950;
      margin: 0 0 8px;
    }

    .map-popup-meta {
      display: grid;
      gap: 4px;
      margin: 8px 0;
      font-size: 0.9rem;
    }

    .map-popup-rating {
      color: var(--blue);
      font-weight: 900;
      margin: 8px 0;
    }

    .map-popup-stars {
      color: var(--orange);
      letter-spacing: 1px;
      font-weight: 950;
    }

    .map-popup-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 9px 0;
    }

    .map-popup-badge {
      display: inline-flex;
      align-items: center;
      background: #ecfdf5;
      color: var(--green);
      border: 1px solid #bbf7d0;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 0.76rem;
      font-weight: 950;
    }

    .map-popup-featured {
      background: #fff0d5;
      color: var(--orange-dark);
      border-color: rgba(255, 122, 24, 0.2);
    }

    .map-popup-link {
      display: block;
      text-align: center;
      margin-top: 10px;
      background: linear-gradient(135deg, var(--orange), var(--gold));
      color: white !important;
      padding: 9px 12px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 950;
    }





    .featured-marker {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ffd700, #ff9f1a);
      border: 3px solid white;
      box-shadow: 0 0 0 3px rgba(255, 193, 7, 0.35);
    }

    .standard-marker {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #123c69;
      border: 3px solid white;
    }




    .leaflet-popup-content-wrapper {
      border-radius: 18px;
      box-shadow: 0 18px 45px rgba(18, 60, 105, 0.18);
    }

    .leaflet-popup-content {
      margin: 14px;
    }

    @media (max-width: 900px) {
      .map-filter-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      #map {
        height: 580px;
      }
    }

    @media (max-width: 650px) {
      .map-page {
        width: 94%;
        margin: 24px auto;
      }

      .map-search-row,
      .map-filter-grid {
        grid-template-columns: 1fr;
      }

      .map-search-row button {
        width: 100%;
      }

      .map-results-summary {
        align-items: flex-start;
        flex-direction: column;
      }

      .map-filter-actions {
        width: 100%;
      }

      .map-filter-actions button {
        width: 100%;
      }

      #map {
        height: 540px;
        border-radius: 22px;
      }

      .map-popup {
        width: 235px;
        max-width: 235px;
      }
    }
  </style>
</head>
<body>

<header class="site-header">
  <div class="logo">Sangat Works</div>
  <nav>
    <a href="index.html">Home</a>
    <div id="accountArea"></div>
  </nav>
</header>

<main class="map-page">
  <section class="map-intro-card">
    <h1>Find the Sangat near you</h1>
    <p>
      Search Sikh businesses, trades and professionals across the UK. Filter by service,
      town, Gurdwara and featured members.
    </p>

    <div class="map-controls">
      <div class="map-search-row">
        <input
          type="text"
          id="mapSearchInput"
          placeholder="Search electrician, plumber, accountant..."
        />
        <button id="mapSearchBtn">Search</button>
      </div>

      <div class="map-filter-grid">
        <div class="map-filter-block">
          <label for="serviceFilter">Service type</label>
          <select id="serviceFilter">
            <option value="">All services</option>
          </select>
        </div>

        <div class="map-filter-block">
          <label for="townFilter">Town</label>
          <select id="townFilter">
            <option value="">All towns</option>
          </select>
        </div>

        <div class="map-filter-block">
          <label for="gurdwaraFilter">Gurdwara</label>
          <select id="gurdwaraFilter">
            <option value="">All Gurdwaras</option>
          </select>
        </div>

        <div class="map-filter-block">
          <label>Featured</label>
          <label class="map-filter-check">
            <input type="checkbox" id="featuredOnlyFilter" />
            Featured only
          </label>
        </div>
      </div>

      <div class="map-results-summary">
        <span id="mapResultsCount">Loading members...</span>

        <div class="map-filter-actions">
          <button id="mapResetBtn" class="map-reset-btn">Reset filters</button>
        </div>
      </div>
    </div>
  </section>

  <section id="map"></section>
</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module" src="js/nav.js"></script>
<script type="module" src="js/map.js?v=4001"></script>

</body>
</html>
