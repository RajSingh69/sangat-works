<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Successful | Sangat Works</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<main class="page-wrap">
  <section class="form-card" style="max-width:700px; text-align:center;">
    <p class="eyebrow">Payment Successful</p>
    <h1>Finish creating your account</h1>

    <p>
      Your Stripe payment was successful. Create your Sangat Works account now
      to unlock member access.
    </p>

    <p>
      This page does not grant membership. Your payment will be verified
      securely before signup.
    </p>

    <div class="hero-actions">
      <a id="finishSignupLink" href="pricing.html" class="btn-primary">
        Finish Creating Account
      </a>
    </div>
  </section>
</main>

<script>
  const params = new URLSearchParams(window.location.search);
  const sessionId = params.get("session_id");
  const finishSignupLink = document.getElementById("finishSignupLink");

  if (!sessionId) {
    window.location.href = "pricing.html";
  } else {
    finishSignupLink.href =
      `signup.html?session_id=${encodeURIComponent(sessionId)}`;
  }
</script>
</body>
</html>
