<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pool | Sangat Works</title>
  <link rel="stylesheet" href="css/style.css?v=4001" />
</head>
<body>

<header class="site-header">
  <a class="logo" href="index.html">Sangat Works</a>
  <nav>
    <a href="index.html">Home</a>
    <a href="skills-network.html">Skills Network</a>
    <a href="profile.html" class="btn-small">My Profile</a>
  </nav>
</header>

<main class="page-wrap">
  <section class="form-card wide">
    <a href="skills-network.html">← Back to Skills Network</a>

    <h1 id="poolName">Loading pool...</h1>
    <p id="poolDescription"></p>

    <div class="profile-strength-box">
      <div class="strength-top">
        <strong>Roles</strong>
      </div>

      <div id="emptyRolesBox" class="profile-strength-box" style="display:none;">
        <p>No roles exist for this pool yet.</p>
        <button id="createStarterRolesBtn" class="btn-primary" type="button">
            Create Starter Roles
        </button>
        </div>

        <div id="rolesList" class="dashboard-grid">
        Loading roles...
        </div>

        <div id="selectedRoleBox" class="profile-strength-box" style="display:none;">
        <div class="strength-top">
          <strong id="selectedRoleName">Selected Role</strong>
        </div>

        <p id="selectedRoleDescription"></p>

        <div id="roleMembersList" class="dashboard-grid" style="margin-top:20px;">
        </div>

        <button id="joinRoleBtn" class="btn-primary" type="button">
          Join This Role
        </button>

        <p id="joinRoleMessage" class="message"></p>
      </div>


    </div>

    <p id="poolMessage" class="message"></p>
  </section>
</main>

<script type="module" src="js/nav.js"></script>
<script type="module">
  import { protectPage } from "./js/subscription-guard.js";
  protectPage();
</script>

<script type="module" src="js/pool.js"></script>
</body>
</html>
